apiVersion: v1
kind: Namespace
metadata:
  labels:
    control-plane: trashed-resources-controller-manager
    app.kubernetes.io/name: trashed-resources
    app.kubernetes.io/managed-by: kustomize
  name: system
---
apiVersion: v1
kind: ConfigMap
metadata:
  # After run make build-installer this name will be trashed-resources-config
  # because namePrefix: trashed-resources
  # If you change this name, change in controller
  # cmName = "trashed-resources-config"
  name: config
  # If you change this namespace, change in code too
  namespace: trashed-resources-system
data:
  namespacesToIgnore: istio-system; kube-node-lease; kube-public; kube-system
  actionsToObserve: delete #or delete; update
  kindsToObserve: Deployment; Secret; ConfigMap
  minutesToKeep: "10" #optional, default is 60. Value is in minutes. It defines how long the TrashedResource will be kept before being deleted.
  hoursToKeep: "0" #optional, default is 0. Value is in hours. It defines how long the TrashedResource will be kept before being deleted.
  daysToKeep: "0" #optional, default is 0. Value is in day (or days). It defines how long the TrashedResource will be kept before being deleted.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: trashed-resources-system
  labels:
    control-plane: trashed-resources-controller-manager
    app.kubernetes.io/name: trashed-resources
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: trashed-resources-controller-manager
      app.kubernetes.io/name: trashed-resources
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: trashed-resources-controller-manager
        app.kubernetes.io/name: trashed-resources
    spec:
      # TODO(user): Uncomment the following code to configure the nodeAffinity expression
      # according to the platforms which are supported by your solution.
      # It is considered best practice to support multiple architectures. You can
      # build your manager image using the makefile target docker-buildx.
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #         - matchExpressions:
      #           - key: kubernetes.io/arch
      #             operator: In
      #             values:
      #               - amd64
      #               - arm64
      #               - ppc64le
      #               - s390x
      #           - key: kubernetes.io/os
      #             operator: In
      #             values:
      #               - linux
      securityContext:
        # Projects are configured by default to adhere to the "restricted" Pod Security Standards.
        # This ensures that deployments meet the highest security requirements for Kubernetes.
        # For more details, see: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
        - /manager
        args:
          - --leader-elect
          - --health-probe-bind-address=:8081
        envFrom:
        - configMapRef:
            name: trashed-resources-config
        image: controller:latest
        imagePullPolicy: IfNotPresent
        name: manager
        stdin: true
        tty: true
        ports: []
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        # TODO(user): Configure the resources accordingly based on the project requirements.
        # More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        volumeMounts: []
      volumes: []
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
