apiVersion: v1
data:
  actionsToObserve: delete
  daysToKeep: "0"
  hoursToKeep: "0"
  kindsToObserve: Deployment; Secret; ConfigMap
  minutesToKeep: "10"
  namespacesToIgnore: istio-system; kube-node-lease; kube-public; kube-system
kind: ConfigMap
metadata:
  name: trashed-resources-trashedresources-config
  namespace: trashed-resources-system
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: trashed-resources
    control-plane: controller-manager
  name: trashed-resources-controller-manager-metrics-service
  namespace: trashed-resources-system
spec:
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: 8443
  selector:
    app.kubernetes.io/name: trashed-resources
    control-plane: controller-manager
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: trashed-resources
    control-plane: controller-manager
  name: trashed-resources-controller-manager
  namespace: trashed-resources-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: trashed-resources
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/name: trashed-resources
        control-plane: controller-manager
    spec:
      containers:
      - args:
        - --metrics-bind-address=:8443
        - --leader-elect
        - --health-probe-bind-address=:8081
        command:
        - /manager
        image: oxmarcos/trashed-resources-controller:1.0.0
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports: []
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts: []
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: trashed-resources-controller-manager
      terminationGracePeriodSeconds: 10
      volumes: []
